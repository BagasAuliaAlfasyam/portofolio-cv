name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npx turbo run check-types --filter=web
          python -m compileall backend

      - name: Build web
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: npx turbo run build --filter=web

      - name: Pack artifacts
        run: |
          mkdir -p .deploy/web .deploy/backend
          cp -R apps/web/.next/standalone/. .deploy/web/
          mkdir -p .deploy/web/apps/web/.next
          cp -R apps/web/.next/static .deploy/web/apps/web/.next/static
          cp -R apps/web/public .deploy/web/apps/web/public
          cp -R backend/. .deploy/backend/
          tar -C .deploy/web -czf catalyst-forge-web.tar.gz .
          tar -C .deploy -czf catalyst-forge-backend.tar.gz backend

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload artifacts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -i ~/.ssh/deploy_key catalyst-forge-web.tar.gz "$VPS_USER@$VPS_HOST:/tmp/catalyst-forge-web.tar.gz"
          scp -i ~/.ssh/deploy_key catalyst-forge-backend.tar.gz "$VPS_USER@$VPS_HOST:/tmp/catalyst-forge-backend.tar.gz"
          scp -i ~/.ssh/deploy_key scripts/deploy-vps.sh "$VPS_USER@$VPS_HOST:/tmp/deploy-vps.sh"

      - name: Deploy on VPS
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          CONTACT_FROM: ${{ secrets.CONTACT_FROM }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NGINX_SERVER_NAME: ${{ secrets.NGINX_SERVER_NAME }}
          RELEASE_ID: ${{ github.sha }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          WEB_PORT: ${{ secrets.WEB_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "APP_DIR='${APP_DIR:-/var/www/catalyst-forge}' \
             BACKEND_CORS_ORIGINS='$BACKEND_CORS_ORIGINS' \
             BACKEND_PORT='${BACKEND_PORT:-8001}' \
             CONTACT_FROM='$CONTACT_FROM' \
             CONTACT_TO='$CONTACT_TO' \
             NEXT_PUBLIC_API_BASE_URL='$NEXT_PUBLIC_API_BASE_URL' \
             NGINX_SERVER_NAME='${NGINX_SERVER_NAME:-_}' \
             RELEASE_ID='$RELEASE_ID' \
             RESEND_API_KEY='$RESEND_API_KEY' \
             WEB_PORT='${WEB_PORT:-3000}' \
             bash /tmp/deploy-vps.sh"
