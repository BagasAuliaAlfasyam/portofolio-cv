name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Type check web
        run: npx turbo run check-types --filter=web

      - name: Lint changed web contact files
        working-directory: apps/web
        run: npx eslint components/contact-form.tsx components/cta-section.tsx --max-warnings 0

      - name: Compile backend
        run: python -m compileall backend

      - name: Import FastAPI app
        run: python -c "import sys; sys.path.insert(0, 'backend'); from main import app; print(app.title)"
